# Local database connection used when running the API on your own machine.
spring.datasource.url=jdbc:mysql://localhost:3306/itemlog_db?useSSL=false&serverTimezone=UTC

# Local MySQL username.
spring.datasource.username=root

# Local MySQL password.
# Do not commit a real password to GitHub.
spring.datasource.password=Local_Password

# Shows SQL queries in the console during local development.
spring.jpa.show-sql=true

# Local JWT secret for development only.
# Must be at least 32 characters.
app.jwt.secret=YOUR_LOCAL_DEV_SECRET_32_PLUS_CHARS

# JWT expiry time in minutes for local development.
app.jwt.expiration-minutes=30