# Activates this file when the test profile is used.
spring.config.activate.on-profile=test

# Test database connection.
# This currently points to a local MySQL database.
spring.datasource.url=jdbc:mysql://localhost:3306/itemlog_db?useSSL=false&serverTimezone=UTC

# Test database username.
spring.datasource.username=root

# Test database password.
# Keep this as a placeholder in GitHub.
spring.datasource.password=Local_Password

# Hibernate validates that the schema matches the entity mappings during tests.
spring.jpa.hibernate.ddl-auto=validate

# Keeps SQL logs quiet during tests.
spring.jpa.show-sql=false

# MySQL dialect for Hibernate.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret used during tests.
# Must be at least 32 characters.
app.jwt.secret=THIS_IS_A_TEST_SECRET_KEY_32_CHARS_MINIMUM

# JWT expiry time in minutes during tests.
app.jwt.expiration-minutes=30