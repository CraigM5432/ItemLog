# Application name used by Spring Boot.
spring.application.name=itemlog-api

# Server port.
# Railway provides PORT as an environment variable.
# If PORT is not set, the API runs on 8080 locally.
server.port=${PORT:8080}

# Database connection details.
# These are loaded from environment variables in deployment.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate checks that the database schema matches the entity mappings.
# It does not automatically create or update tables.
spring.jpa.hibernate.ddl-auto=validate

# Disables SQL logging in deployed/production environments.
spring.jpa.show-sql=false

# Tells Hibernate to use MySQL-specific SQL dialect.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret used to sign tokens.
# This should always come from an environment variable.
app.jwt.secret=${JWT_SECRET}

# JWT expiry time in minutes.
# Defaults to 30 minutes if JWT_EXPIRATION_MINUTES is not set.
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}